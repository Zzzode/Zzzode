<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="340" viewBox="0 0 800 340" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Background Terminal Window -->
    <rect x="0" y="0" width="800" height="340" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

    <!-- Window Controls -->
    <circle cx="25" cy="20" r="6" fill="#FF5F56"/>
    <circle cx="45" cy="20" r="6" fill="#FFBD2E"/>
    <circle cx="65" cy="20" r="6" fill="#27C93F"/>

    <!-- Header Title -->
    <text x="320" y="25" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #00EBC0;">NEON TELEMETRY // ONLINE</text>

    <!-- Divider -->
    <line x1="0" y1="45" x2="800" y2="45" stroke="#30363D" stroke-width="2"/>

    <!-- Stats Header -->
    <text x="40" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">UPTIME (7d):</text>
    <text x="150" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">34 hrs 7 mins</text>

    <text x="450" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">DAILY FLUX:</text>
    <text x="560" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">4 hrs 52 mins</text>
    
    <!-- Other Row -->
    <text x="40" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">Other</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="120" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="120" width="212" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="212" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">71.0%</text>
    <text x="600" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">24 hrs 12 mins</text>
    
    <!-- TypeScript Row -->
    <text x="40" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">TypeScript</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="155" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="155" width="35" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="35" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">11.9%</text>
    <text x="600" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">4 hrs 3 mins</text>
    
    <!-- C++ Row -->
    <text x="40" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">C++</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="190" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="190" width="22" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="22" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">7.7%</text>
    <text x="600" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">2 hrs 36 mins</text>
    
    <!-- Markdown Row -->
    <text x="40" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">Markdown</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="225" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="225" width="8" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="8" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">2.8%</text>
    <text x="600" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">58 mins</text>
    
    <!-- JSON Row -->
    <text x="40" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">JSON</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="260" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="260" width="6" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="6" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">2.2%</text>
    <text x="600" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">45 mins</text>
    
    <line x1="40" y1="305" x2="760" y2="305" stroke="#30363D" stroke-width="1"/>
    
    <text x="80" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">REPOS:</text>
    <text x="140" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">66</text>

    <text x="240" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">STARS:</text>
    <text x="300" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">11</text>

    <text x="400" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">FORKS:</text>
    <text x="460" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">5</text>

    <text x="560" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">FOLLOWERS:</text>
    <text x="650" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">11</text>
    </svg>