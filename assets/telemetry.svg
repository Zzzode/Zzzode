<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="340" viewBox="0 0 800 340" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Background Terminal Window -->
    <rect x="0" y="0" width="800" height="340" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

    <!-- Window Controls -->
    <circle cx="25" cy="20" r="6" fill="#FF5F56"/>
    <circle cx="45" cy="20" r="6" fill="#FFBD2E"/>
    <circle cx="65" cy="20" r="6" fill="#27C93F"/>

    <!-- Header Title -->
    <text x="320" y="25" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #00EBC0;">NEON TELEMETRY // ONLINE</text>

    <!-- Divider -->
    <line x1="0" y1="45" x2="800" y2="45" stroke="#30363D" stroke-width="2"/>

    <!-- Stats Header -->
    <text x="40" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">UPTIME (7d):</text>
    <text x="150" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">99 hrs 19 mins</text>

    <text x="450" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">DAILY FLUX:</text>
    <text x="560" y="80" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">14 hrs 11 mins</text>
    
    <!-- C++ Row -->
    <text x="40" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">C++</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="120" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="120" width="142" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="142" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">47.5%</text>
    <text x="600" y="132" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">47 hrs 13 mins</text>
    
    <!-- Markdown Row -->
    <text x="40" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">Markdown</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="155" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="155" width="34" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="34" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">11.7%</text>
    <text x="600" y="167" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">11 hrs 34 mins</text>
    
    <!-- JSON Row -->
    <text x="40" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">JSON</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="190" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="190" width="29" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="29" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">9.8%</text>
    <text x="600" y="202" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">9 hrs 41 mins</text>
    
    <!-- ANTLR Row -->
    <text x="40" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">ANTLR</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="225" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="225" width="24" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="24" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">8.3%</text>
    <text x="600" y="237" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">8 hrs 15 mins</text>
    
    <!-- Python Row -->
    <text x="40" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">Python</text>

    <!-- Progress Bar Background -->
    <rect x="180" y="260" width="300" height="16" rx="4" fill="#21262D"/>
    <!-- Progress Bar Fill -->
    <rect x="180" y="260" width="17" height="16" rx="4" fill="#00EBC0">
        <animate attributeName="width" from="0" to="17" dur="1s" fill="freeze" />
    </rect>

    <text x="500" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #C9D1D9;">5.9%</text>
    <text x="600" y="272" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #8B949E;">5 hrs 53 mins</text>
    
    <line x1="40" y1="305" x2="760" y2="305" stroke="#30363D" stroke-width="1"/>
    
    <text x="80" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">REPOS:</text>
    <text x="140" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">69</text>

    <text x="240" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">STARS:</text>
    <text x="300" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">12</text>

    <text x="400" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">FORKS:</text>
    <text x="460" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">5</text>

    <text x="560" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #FF4FD8;">FOLLOWERS:</text>
    <text x="650" y="330" style="font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7C8CFF;">12</text>
    </svg>