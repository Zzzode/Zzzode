<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
    .terminal-text { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 14px; fill: #c9d1d9; }
    .prompt { fill: #3fb950; }
    .cursor { fill: #c9d1d9; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#0d1117" stroke="#30363d" />

  <!-- Window Controls -->
  <circle cx="25" cy="25" r="6" fill="#ff5f56" />
  <circle cx="45" cy="25" r="6" fill="#ffbd2e" />
  <circle cx="65" cy="25" r="6" fill="#27c93f" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="header">zzzode@dev-machine</text>

  <!-- Divider -->
  <line x1="0" y1="55" x2="800" y2="55" stroke="#30363d" />

  <!-- Terminal Content -->
  <g transform="translate(30, 90)">
    <!-- Command 1 -->
    <text x="0" y="0" class="terminal-text">
      <tspan class="prompt">➜</tspan> <tspan fill="#79c0ff">~</tspan> whoami
    </text>
    <text x="0" y="25" class="terminal-text" fill="#e6edf3">Compiler Engineer | VM Enthusiast | Open Source Contributor</text>

    <!-- Command 2 -->
    <text x="0" y="65" class="terminal-text">
      <tspan class="prompt">➜</tspan> <tspan fill="#79c0ff">~</tspan> cat skills.json
    </text>
    
    <!-- JSON Output -->
    <text x="0" y="90" class="terminal-text" fill="#e6edf3">{</text>
    <text x="20" y="115" class="terminal-text" fill="#7ee787">"languages"</text><text x="110" y="115" class="terminal-text">: [</text><text x="135" y="115" class="terminal-text" fill="#a5d6ff">"C++"</text><text x="180" y="115" class="terminal-text">, </text><text x="195" y="115" class="terminal-text" fill="#a5d6ff">"Rust"</text><text x="245" y="115" class="terminal-text">, </text><text x="260" y="115" class="terminal-text" fill="#a5d6ff">"TypeScript"</text><text x="365" y="115" class="terminal-text">],</text>
    <text x="20" y="140" class="terminal-text" fill="#7ee787">"interests"</text><text x="110" y="140" class="terminal-text">: [</text><text x="135" y="140" class="terminal-text" fill="#a5d6ff">"Compilers"</text><text x="230" y="140" class="terminal-text">, </text><text x="245" y="140" class="terminal-text" fill="#a5d6ff">"WebAssembly"</text><text x="350" y="140" class="terminal-text">, </text><text x="365" y="140" class="terminal-text" fill="#a5d6ff">"System Design"</text><text x="490" y="140" class="terminal-text">],</text>
    <text x="20" y="165" class="terminal-text" fill="#7ee787">"status"</text><text x="85" y="165" class="terminal-text">: </text><text x="100" y="165" class="terminal-text" fill="#a5d6ff">"Building things that matter"</text>
    <text x="0" y="190" class="terminal-text" fill="#e6edf3">}</text>

    <!-- Command 3 -->
    <text x="0" y="230" class="terminal-text">
      <tspan class="prompt">➜</tspan> <tspan fill="#79c0ff">~</tspan> <tspan class="cursor">_</tspan>
    </text>
  </g>
</svg>